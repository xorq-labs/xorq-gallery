name: codspeed

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write   # required for OIDC tokenless auth on public repos

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --group test

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v3
        with:
          run: uv run --no-sync pytest tests/test_benchmarks.py --codspeed --import-mode=importlib
          token: ${{ secrets.CODSPEED_TOKEN }}
